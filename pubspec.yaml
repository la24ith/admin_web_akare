name: admin_web
description: "لوحة تحكم الإدارة - أكاري (Flutter Web)"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  supabase_flutter: ^2.5.0
  flutter_bloc: ^8.1.5
  get_it: ^7.7.0
  go_router: ^14.1.0
  dartz: ^0.10.1
  equatable: ^2.0.5
  cached_network_image: ^3.3.1
  url_launcher: ^6.2.6
  share_plus: ^9.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^12.0.0
  image_picker: ^1.1.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # أضف هون فونت Cairo أو Tajawal لدعم العربية بشكل أفضل، مثال:
  # fonts:
  #   - family: Cairo
  #     fonts:
  #       - asset: assets/fonts/Cairo-Regular.ttf
  #       - asset: assets/fonts/Cairo-Bold.ttf
  #         weight: 700
